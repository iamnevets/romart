name: Deploy to AWS

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allow manual trigger

env:
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    name: Build and Deploy Romart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      # ============================================
      # CACHE YARN DEPENDENCIES
      # ============================================
      - name: Get Yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Cache Backend Yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            backend/node_modules
            backend/apps/backend/node_modules
            ${{ steps.yarn-cache-dir.outputs.dir }}
          key: backend-yarn-${{ runner.os }}-${{ hashFiles('backend/yarn.lock', 'backend/package.json') }}
          restore-keys: |
            backend-yarn-${{ runner.os }}-

      - name: Cache Storefront Yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            storefront/node_modules
            ${{ steps.yarn-cache-dir.outputs.dir }}
          key: storefront-yarn-${{ runner.os }}-${{ hashFiles('storefront/package.json', 'storefront/yarn.lock') }}
          restore-keys: |
            storefront-yarn-${{ runner.os }}-

      # ============================================
      # BUILD BACKEND
      # ============================================
      - name: Install Backend Dependencies
        working-directory: backend
        run: yarn install --frozen-lockfile

      - name: Build Backend
        working-directory: backend/apps/backend
        run: yarn build

      # ============================================
      # BUILD STOREFRONT
      # ============================================
      - name: Install Storefront Dependencies
        working-directory: storefront
        run: yarn install --frozen-lockfile

      - name: Build Storefront
        working-directory: storefront
        run: yarn build
        env:
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}

      # ============================================
      # PREPARE DEPLOYMENT PACKAGE
      # ============================================
      - name: Create deployment package
        run: |
          mkdir -p deploy/backend deploy/storefront

          # Backend files (Medusa 2.x builds to .medusa/server)
          # Copy workspace structure
          mkdir -p deploy/backend_workspace
          cp -r backend/node_modules deploy/backend_workspace/
          cp backend/package.json deploy/backend_workspace/

          # Copy app files
          cp -r backend/apps/backend/.medusa deploy/backend/
          cp -r backend/apps/backend/node_modules deploy/backend/
          cp -r backend/apps/backend/src deploy/backend/
          cp backend/apps/backend/package*.json deploy/backend/
          cp backend/apps/backend/medusa-config.ts deploy/backend/
          cp backend/apps/backend/tsconfig.json deploy/backend/

          # Storefront files
          cp -r storefront/.next deploy/storefront/
          cp -r storefront/node_modules deploy/storefront/
          cp -r storefront/public deploy/storefront/
          cp storefront/package*.json deploy/storefront/
          cp storefront/next.config.* deploy/storefront/

          # Create tarball
          tar -czf deploy.tar.gz deploy/

      # ============================================
      # DEPLOY TO EC2
      # ============================================
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'EOF'
          ${{ secrets.EC2_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to EC2
        run: |
          scp -i ~/.ssh/deploy_key deploy.tar.gz ubuntu@${{ secrets.EC2_HOST }}:/tmp/

      - name: Deploy on EC2
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=5 -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            echo "=== Stopping applications ==="
            pm2 stop romart-backend romart-storefront || true

            echo "=== Extracting deployment package ==="
            cd ~
            tar -xzf /tmp/deploy.tar.gz

            echo "=== Deploying Backend ==="
            mkdir -p romart/backend/apps/backend
            cp -r deploy/backend_workspace/* romart/backend/
            cp -r deploy/backend/* romart/backend/apps/backend/

            echo "=== Deploying Storefront ==="
            mkdir -p romart/storefront
            cp -r deploy/storefront/* romart/storefront/

            echo "=== Setting up environment ==="
            export NODE_ENV=production

            echo "=== Creating Backend .env.production ==="
            cat > ~/romart/backend/apps/backend/.env.production << 'ENVEOF'
DATABASE_URL=${{ secrets.DATABASE_URL }}
REDIS_URL=${{ secrets.REDIS_URL }}
ADMIN_CORS=https://api.romartkitchens.com,https://romartkitchens.com
STORE_CORS=https://romartkitchens.com,https://www.romartkitchens.com
AUTH_CORS=https://api.romartkitchens.com,https://romartkitchens.com,https://www.romartkitchens.com
JWT_SECRET=${{ secrets.JWT_SECRET }}
COOKIE_SECRET=${{ secrets.COOKIE_SECRET }}
PAYSTACK_SECRET_KEY=${{ secrets.PAYSTACK_SECRET_KEY }}
S3_BUCKET=romart-media-bucket
S3_REGION=us-east-1
NODE_ENV=production
ENVEOF

            echo "=== Creating Storefront .env.local ==="
            cat > ~/romart/storefront/.env.local << 'ENVEOF'
NEXT_PUBLIC_MEDUSA_BACKEND_URL=${{ secrets.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}
NODE_ENV=production
ENVEOF

            echo "=== Running Database Migrations ==="
            cd ~/romart/backend/apps/backend
            NODE_ENV=production npx medusa db:migrate

            echo "=== Starting Backend ==="
            cd ~/romart/backend/apps/backend
            pm2 start npm --name "romart-backend" --update-env -e ~/romart/logs/backend-error.log -o ~/romart/logs/backend-out.log -- run start || pm2 restart romart-backend --update-env

            echo "=== Creating log directories ==="
            mkdir -p ~/romart/logs

            echo "=== Starting Storefront ==="
            cd ~/romart/storefront
            pm2 start npm --name "romart-storefront" --update-env -e ~/romart/logs/storefront-error.log -o ~/romart/logs/storefront-out.log -- run start || pm2 restart romart-storefront --update-env

            echo "=== Saving PM2 configuration ==="
            pm2 save

            echo "=== Cleaning up ==="
            rm -rf ~/deploy
            rm /tmp/deploy.tar.gz

            echo "=== Deployment Complete ==="
            pm2 list
          ENDSSH

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f deploy.tar.gz

      # ============================================
      # NOTIFY (Optional)
      # ============================================
      - name: Deployment Status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
